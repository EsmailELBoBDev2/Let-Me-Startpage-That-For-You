<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Let Me Startpage That For You</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c1e2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Shared page layout ── */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      padding: 2rem;
      width: 100%;
      max-width: 580px;
    }
    .page.show { display: flex; }

    h1 { font-size: 1.9rem; color: #e8eaf0; text-align: center; line-height: 1.3; }
    h1 em { font-style: normal; color: #7b8cde; }

    /* ── Search bar (shared look) ── */
    .bar {
      display: flex;
      width: 100%;
      background: #252740;
      border: 2px solid #383b5a;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
      transition: border-color .25s, box-shadow .25s;
    }
    .bar.focused {
      border-color: #7b8cde;
      box-shadow: 0 0 0 4px rgba(123,140,222,.18);
    }
    .bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: .8rem 1.2rem;
      font-size: 1rem;
      background: transparent;
      color: #e8eaf0;
      cursor: text;
    }
    .bar input::placeholder { color: #555870; }
    .bar button {
      border: none;
      background: #7b8cde;
      color: #fff;
      padding: 0 1.4rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
      border-radius: 0 26px 26px 0;
    }
    .bar button:hover  { background: #6475cc; }
    .bar button.pop    { transform: scale(.94); background: #5060b8; }

    /* ── Home: share row ── */
    .share-row {
      display: none;
      flex-direction: column;
      align-items: stretch;
      gap: .5rem;
      width: 100%;
    }
    .share-row label { font-size: .8rem; color: #7a7d99; }
    .share-row .copy-wrap {
      display: flex;
      gap: .4rem;
    }
    .share-row input {
      flex: 1;
      border: 1px solid #383b5a;
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .85rem;
      color: #b0b4d0;
      background: #252740;
      outline: none;
      cursor: text;
    }
    .share-row button {
      border: none;
      background: #7b8cde;
      color: #fff;
      border-radius: 8px;
      padding: .6rem 1.1rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .share-row button:hover { background: #6475cc; }

    /* ── Player: status hint ── */
    @keyframes pop-in {
      from { opacity: 0; transform: scale(.7) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    #hint {
      font-size: 1.6rem;
      font-weight: 700;
      color: #7b8cde;
      min-height: 2em;
      text-align: center;
      letter-spacing: -.3px;
      opacity: 0;
    }
    #hint.visible {
      animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    /* ── Fake animated cursor ── */
    #cur {
      position: fixed;
      top: 0; left: 0;
      width: 22px;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: left .65s cubic-bezier(.4,0,.2,1),
                  top  .65s cubic-bezier(.4,0,.2,1),
                  opacity .3s;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.6));
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      text-align: center;
      padding: .75rem 1rem;
      font-size: .78rem;
      color: #7a7e9e;
      border-top: 1px solid #252740;
      background: #1c1e2e;
    }
    footer a {
      color: #9ba8e8;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- ════ HOME page ════ -->
<div id="pg-home" class="page show">
  <h1>Let Me <em>Startpage</em> That<br>For You</h1>

  <div class="bar" id="home-bar">
    <input id="home-q" type="text" placeholder="What should they have searched?" autofocus>
    <button id="home-btn" onclick="generate()">Make Link</button>
  </div>

  <div class="share-row" id="share-row">
    <label>Share this link with whoever couldn't be bothered to search:</label>
    <div class="copy-wrap">
      <input id="share-url" readonly>
      <button id="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>
</div>

<!-- ════ PLAYER page ════ -->
<div id="pg-play" class="page">
  <h1>Let Me <em>Startpage</em> That<br>For You</h1>

  <div class="bar" id="play-bar">
    <input id="play-q" type="text" readonly placeholder="" autocomplete="off" spellcheck="false">
    <button id="play-btn">Search</button>
  </div>

  <p id="hint"></p>
</div>

<footer>
  Uses <a href="https://www.startpage.com" target="_blank" rel="noopener">Startpage™</a> —
  Google results, no tracking. Not affiliated with Startpage. Startpage is a trademark of Startpage B.V. 🔒
</footer>

<!-- Fake cursor (arrow SVG) -->
<div id="cur">
  <svg viewBox="0 0 18 22" xmlns="http://www.w3.org/2000/svg">
    <path d="M1 1 L1 17 L5 13 L8.5 21 L10.5 20 L7 12 L13 12 Z"
          fill="#e8eaf0" stroke="#1c1e2e" stroke-width="1.5"
          stroke-linejoin="round" stroke-linecap="round"/>
  </svg>
</div>

<script>
/* ── Routing ── */
const params = new URLSearchParams(location.search);
const q = params.get('q');

if (q) {
  document.getElementById('pg-home').classList.remove('show');
  document.getElementById('pg-play').classList.add('show');
  runPlayer(decodeURIComponent(q));
}

/* ── Home: generate link ── */
document.getElementById('home-q').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

function generate() {
  const val = document.getElementById('home-q').value.trim();
  if (!val) return;

  // Build a self-referencing URL with ?q=
  const url = location.href.split('?')[0] + '?q=' + encodeURIComponent(val);
  document.getElementById('share-url').value = url;
  document.getElementById('share-row').style.display = 'flex';
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('share-url').value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}

/* ── Player: animation ── */
async function runPlayer(text) {
  const bar   = document.getElementById('play-bar');
  const input = document.getElementById('play-q');
  const btn   = document.getElementById('play-btn');
  const hint  = document.getElementById('hint');
  const cur   = document.getElementById('cur');

  // Helpers
  const wait = ms => new Promise(r => setTimeout(r, ms));

  function center(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  function moveCurTo(el, offX = 0, offY = 0) {
    const c = center(el);
    cur.style.left = (c.x + offX) + 'px';
    cur.style.top  = (c.y + offY) + 'px';
  }

  /* 1. Place cursor off-screen top, then fade in */
  const barC = center(bar);
  cur.style.transition = 'none';
  cur.style.left = (barC.x - 120) + 'px';
  cur.style.top  = '-40px';
  cur.style.opacity = '1';

  await wait(400);

  /* 2. Slide cursor to the search input */
  cur.style.transition = 'left .65s cubic-bezier(.4,0,.2,1), top .65s cubic-bezier(.4,0,.2,1), opacity .3s';
  moveCurTo(input, -30, 2);
  await wait(750);

  /* 3. Focus / highlight the bar */
  bar.classList.add('focused');
  await wait(300);

  /* 4. Type characters one by one */
  for (const ch of text) {
    input.value += ch;
    await wait(60 + Math.random() * 60);
  }

  await wait(500);
  hint.textContent = 'Was that so hard? 🙄';
  hint.classList.add('visible');

  /* 5. Move cursor to Search button */
  moveCurTo(btn, -8, 0);
  await wait(800);

  /* 6. Fake click */
  btn.classList.add('pop');
  await wait(200);
  btn.classList.remove('pop');
  await wait(300);

  /* 7. Redirect */
  location.href = 'https://www.startpage.com/search?q=' + encodeURIComponent(text);
}
</script>
</body>
</html>
